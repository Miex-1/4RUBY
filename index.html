<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cikgu Hilmi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F3F0FF;--ink:#2B2358;--muted:#7A72A8;--primary:#6C4DF4;--primary-dark:#5438D6;--line:#E4DFFA;--card:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;color:var(--ink);background:var(--bg);
  background-image:radial-gradient(circle at 15% 12%,#E6DEFF 0,transparent 34%),
                   radial-gradient(circle at 85% 88%,#DFF6FF 0,transparent 34%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:460px;width:100%}

/* ---------- PROFIL (ruang untuk masa depan) ---------- */
.profil{text-align:center;margin-bottom:26px}
.profil h1{font-family:'Baloo 2',cursive;font-size:2.3rem;color:var(--primary);line-height:1.1}
.profil p{color:var(--muted);font-weight:700;margin-top:4px;font-size:1.02rem}

/* ---------- KAD PROJEK ---------- */
.projek{background:var(--card);border:2px solid var(--line);border-radius:24px;
  padding:20px;box-shadow:0 6px 0 var(--line);margin-bottom:18px}
.projek .gambar{width:100%;border-radius:16px;overflow:hidden;background:#F0EEF9;margin-bottom:18px}
.projek .gambar img{width:100%;display:block;object-fit:cover}
.projek h2{font-family:'Baloo 2',cursive;font-size:1.35rem;text-align:center;margin-bottom:4px}
.projek .desc{color:var(--muted);font-weight:700;text-align:center;font-size:.92rem;margin-bottom:16px}
.btn{display:block;text-align:center;text-decoration:none;font-family:'Baloo 2',cursive;
  font-size:1.15rem;font-weight:700;padding:16px;border-radius:16px;border:0;cursor:pointer;
  background:var(--primary);color:#fff;box-shadow:0 5px 0 var(--primary-dark);transition:transform .05s}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--primary-dark)}

.foot{text-align:center;color:var(--muted);font-weight:700;font-size:.8rem;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">

  <!-- PROFIL — anda boleh kembangkan bahagian ini nanti -->
  <div class="profil">
    <h1>👋 Cikgu Hilmi</h1>
    <p>Selamat datang ke laman saya</p>
  </div>

  <!-- PROJEK: JAGUH SIFIR -->
  <div class="projek">
    <div class="gambar">
      <img src="https://raw.githubusercontent.com/Miex-1/SIFIR/refs/heads/main/Under_Construction_Sign.jpg" alt="Latihan Sifir">
    </div>
    <h2>🏆 Latihan Sifir</h2>
    <p class="desc">Program hafalan sifir untuk murid</p>
    <a class="btn" href="/sifir/">TEKAN SINI KE LATIHAN SIFIR →</a>
  </div>

  <!-- Nak tambah projek lain nanti? Salin blok .projek di atas,
       tukar gambar, tajuk, dan pautan butang. -->

  <p class="foot">© Cikgu Hilmi</p>
</div>
</body>
</html>
